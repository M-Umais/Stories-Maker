<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Early safeguard against libraries trying to overwrite window.fetch
      (function() {
        try {
          var _f = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return _f; },
            set: function(v) { _f = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Early fetch safeguard failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
